<div class="card" v-show="first_load_done" id="phase_1_card">                  
    <div class="card-header fw-bold">                
        <span class="align-middle">History - Current Period: [[get_current_session_period().period_number]]</span>       
            
        <span class="float-end">
            
        </span>
        
    </div>
    <div class="card-body"> 
        <!-- units table -->
        <div class="row justify-content-center" >
            <div class="col-auto">
                <table class="table table-condensed"> 
                    <thead>
                        <tr>
                            <th scope="col" class = "text-center">
                               Period
                            </th>
                            <th scope="col" class = "text-center">
                                My Phase 1<br>Type A Bid
                            </th>
                            <th scope="col" class = "text-center">
                                Counterpart's Phase 1<br>Type A Bid
                            </th>                            
                            <th scope="col" class = "text-center">
                                My Role
                            </th>                          
                        </tr>
                    </thead>
                    <tbody >
                        <tr v-for="item in get_history()" :key="item.period_number">
                            <td class="text-center">
                               [[item.period_number]]
                            </td>
                            <td class="text-center">
                                [[item.my_type_a_phase_1_units]]
                            </td>
                            <td class="text-center">
                                [[item.counterpart_type_a_phase_1_units]]
                            </td>   
                            <td class="text-center">
                                [[item.my_role]]
                            </td>                                            
                        </tr>
                       
                    </tbody>
                    
                </table>
            </div>
        </div>
    </div>                    
</div>
