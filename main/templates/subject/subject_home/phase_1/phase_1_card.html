<div class="card" v-show="first_load_done" id="phase_1_card">                  
    <div class="card-header fw-bold">                
        <span class="align-middle">Phase 1: Bid to become the manager.</span>       
            
        <span class="float-end">
            
        </span>
        
    </div>
    <div class="card-body"> 
        <!-- units table -->
        <div class="row justify-content-center" >
            <div class="col-auto">
                <table class="table table-condensed"> 
                    <thead>
                        <tr>
                            <th scope="col" class = "">
                               
                            </th>
                            <th scope="col" class = "">
                                My Units
                            </th>
                            <th scope="col" class = "">
                                Counterpart Units
                            </th>                            
                                                     
                        </tr>
                    </thead>
                    <tbody >
                        <tr>
                            <td class="fw-bold" >
                               Type A Units
                            </td>
                            <td class="text-center">
                               [[get_my_type_a_units()]]
                            </td>
                            <td class="text-center">
                                [[get_counterpart_type_a_units()]]
                            </td>                                               
                        </tr>
                        <tr>
                            <td class="fw-bold" >
                               Type B Units
                            </td>
                            <td class="text-center">
                                [[get_my_type_b_units()]]
                            </td>
                            <td class="text-center">
                                [[get_counterpart_type_b_units()]]
                            </td>                                               
                        </tr>
                    </tbody>
                    
                </table>
            </div>
        </div>

        <!-- bid form -->
        <div class="row justify-content-center fw-bold mt-4">
            <div class="col-auto text-start" id="div_id_type_a_bid">
                Submit how many Type A Units to spend to compete for the manager role
            </div>
        </div>
        <div class="row justify-content-center fw-bold mt-2">
            <div class="col-auto text-start" id="div_id_type_a_bid">
                <input type="number" 
                    class="transfer_model_input form-control-lg fw-bold"
                    v-model="type_a_bid"
                    min="0"
                    max="999"
                    step="1"
                    id="type_a_bid">     
            </div>
        </div>
        
    </div>                    
</div>
